<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rain2</title>
  <style>
    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      position: relative;
      background: #11111f;
    }

    #lightning-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.85s ease-out; /* Быстрое появление */
      z-index: 10;
      mix-blend-mode: screen;
    }

    /* Изменено: Максимальная прозрачность при появлении теперь 0.85 */
    #lightning-image.active {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <img id="lightning-image" src="https://raw.githubusercontent.com/0x2171/Test/refs/heads/main/IMG_20260522_025103.jpg" alt="Lightning">

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    let scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x11111f, 0.002);

    let camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 1;
    camera.rotation.x = 1.16;
    camera.rotation.y = -0.12;
    camera.rotation.z = 0.27;

    let renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setClearColor(scene.fog.color);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ===== POST-PROCESSING =====
    const renderScene = new RenderPass(scene, camera);
    
    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.5,
      0.4,
      0.85
    );
    bloomPass.threshold = 0.85;
    bloomPass.strength = 2.0;
    bloomPass.radius = 0.5;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    let ambient = new THREE.AmbientLight(0x555555);
    scene.add(ambient);

    let directionalLight = new THREE.DirectionalLight(0xffeedd);
    directionalLight.position.set(0, 0, 1);
    scene.add(directionalLight);

    let flash = new THREE.PointLight(0x062d89, 30, 500, 1.7);
    flash.position.set(200, 300, 100);
    scene.add(flash);

    let rainCount = 9500;
    let cloudParticles = [];
    
    // Создаем отдельные массивы для позиций и скоростей (Исправление ошибки NaN)
    let rainPositions = new Float32Array(rainCount * 3);
    let rainVelocities = new Float32Array(rainCount);

    for (let i = 0; i < rainCount; i++) {
      rainPositions[i * 3] = Math.random() * 400 - 200;     // x
      rainPositions[i * 3 + 1] = Math.random() * 500 - 250; // y
      rainPositions[i * 3 + 2] = Math.random() * 400 - 200; // z
      rainVelocities[i] = 0;                                 // velocity
    }

    let rainGeo = new THREE.BufferGeometry();
    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
    rainGeo.setAttribute('velocity', new THREE.BufferAttribute(rainVelocities, 1));

    let rainMaterial = new THREE.PointsMaterial({
      color: 0xccddff,
      size: 0.15,
      transparent: true,
      opacity: 0.8,
      blending: THREE.AdditiveBlending
    });

    let rain = new THREE.Points(rainGeo, rainMaterial);
    scene.add(rain);

    let loader = new THREE.TextureLoader();
    loader.load("https://raw.githubusercontent.com/navin-navi/codepen-assets/master/images/smoke.png", function(texture) {
      let cloudGeo = new THREE.PlaneGeometry(500, 500);
      let cloudMaterial = new THREE.MeshLambertMaterial({
        map: texture,
        transparent: true,
        blending: THREE.AdditiveBlending,
        opacity: 0.4
      });

      for (let p = 0; p < 25; p++) {
        let cloud = new THREE.Mesh(cloudGeo, cloudMaterial);
        cloud.position.set(
          Math.random() * 800 - 400,
          500,
          Math.random() * 500 - 500
        );
        cloud.rotation.x = 1.16;
        cloud.rotation.y = -0.12;
        cloud.rotation.z = Math.random() * 2 * Math.PI;
        cloud.material.opacity = 0.45;
        cloudParticles.push(cloud);
        scene.add(cloud);
      }
    });

    function render() {
      composer.render();
      requestAnimationFrame(render);

      cloudParticles.forEach(p => {
        p.rotation.z -= 0.002;
      });

      // Обновление дождя
      const positions = rainGeo.attributes.position.array;
      const velocities = rainGeo.attributes.velocity.array;

      for (let i = 0; i < rainCount; i++) {
        velocities[i] -= 0.1 + Math.random() * 0.1;
        positions[i * 3 + 1] += velocities[i];
        
        if (positions[i * 3 + 1] < -100) {
          positions[i * 3] = Math.random() * 400 - 200;
          positions[i * 3 + 1] = 100;
          positions[i * 3 + 2] = Math.random() * 400 - 200;
          velocities[i] = 0;
        }
      }

      rainGeo.attributes.position.needsUpdate = true;
      rainGeo.attributes.velocity.needsUpdate = true;
      rain.rotation.y += 0.002;

      // Логика молнии
      if (Math.random() > 0.99 || flash.power > 100) {
        if (flash.power < 100) {
          flash.position.set(
            Math.random() * 400,
            300 + Math.random() * 200,
            100
          );
          flash.color.setHex(0x88ccff);
        }
        
        flash.power = 50 + Math.random() * 600;
        
        const lightningImg = document.getElementById('lightning-image');
        // Изменено: Устанавливаем opacity 0.85
        lightningImg.style.opacity = 0.85;
        lightningImg.classList.add('active');
        
        // Плавное затухание
        let fade = setInterval(() => {
          let opacity = parseFloat(lightningImg.style.opacity);
          if (opacity <= 0.05) {
            lightningImg.style.opacity = 0;
            lightningImg.classList.remove('active');
            clearInterval(fade);
          } else {
            lightningImg.style.opacity = opacity - 0.05; // Скорость затухания
          }
        }, 30);

        document.body.style.backgroundColor = '#445577';
        setTimeout(() => {
          document.body.style.backgroundColor = '#11111f';
        }, 80);
      }
      
      if (flash.power > 30) {
        flash.power *= 0.92;
      }
    }

    render();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    document.body.addEventListener('click', () => {
      flash.power = 700 + Math.random() * 400;
      flash.color.setHex(0xffffff);
      flash.position.set(
        Math.random() * 400 - 200,
        300 + Math.random() * 100,
        100
      );

      document.body.style.backgroundColor = '#ffffff';
      setTimeout(() => {
        document.body.style.backgroundColor = '#11111f';
      }, 50);
      
      
    });
  </script>
</body>
</html>
